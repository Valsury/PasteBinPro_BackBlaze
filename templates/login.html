{% extends "base.html" %}

{% block title %}Вход - PasteBin Pro{% endblock %}

{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <div class="auth-icon">
                        <i class="fas fa-sign-in-alt"></i>
                    </div>
                    <h2 class="gradient-text mb-2">Вход в аккаунт</h2>
                    <p class="text-muted">Войдите, чтобы получить доступ ко всем функциям</p>
                </div>

                <form method="POST" action="{{ url_for('login') }}" class="auth-form">
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope me-2"></i>Email или имя пользователя
                        </label>
                        <input type="text" class="form-control" id="email" name="email" required
                               placeholder="Введите email или username">
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-2"></i>Пароль
                        </label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="password" name="password" required
                                   placeholder="Введите пароль">
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">
                            Запомнить меня
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Войти
                    </button>

                    <div class="text-center">
                        <a href="#" class="text-decoration-none text-muted small">Забыли пароль?</a>
                    </div>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="text-muted mb-2">Нет аккаунта?</p>
                        <a href="{{ url_for('register') }}" class="btn btn-outline-primary w-100">
                            <i class="fas fa-user-plus me-2"></i>Зарегистрироваться
                        </a>
                    </div>
                </form>

                <!-- Demo notice -->
                <div class="alert alert-info mt-4" role="alert">
                    <i class="fas fa-info-circle me-2"></i>
                    <strong>Демо-режим:</strong> Функция авторизации в разработке
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.auth-card {
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 2.5rem;
    box-shadow: var(--shadow-xl);
    border: 1px solid var(--border-color);
}

.auth-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 1.5rem;
    background: var(--gradient-primary);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    color: white;
    box-shadow: var(--shadow-lg);
}

.auth-form .form-control {
    border-radius: 10px;
    padding: 0.75rem 1rem;
    border: 2px solid var(--gray-200);
    transition: var(--transition);
}

[data-theme="dark"] .auth-form .form-control {
    background: var(--bg-secondary);
    border-color: var(--gray-700);
    color: var(--text-primary);
}

.auth-form .form-control:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.15);
}

.auth-form .btn-primary {
    border-radius: 10px;
    padding: 0.75rem;
    font-weight: 600;
    background: var(--gradient-primary);
    border: none;
    box-shadow: var(--shadow-md);
    transition: var(--transition);
}

.auth-form .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
}

.auth-form .btn-outline-primary {
    border-radius: 10px;
    padding: 0.75rem;
    font-weight: 600;
    border: 2px solid var(--primary);
    color: var(--primary);
    transition: var(--transition);
}

.auth-form .btn-outline-primary:hover {
    background: var(--gradient-primary);
    border-color: transparent;
    color: white;
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
}

.input-group .btn-outline-secondary {
    border-radius: 0 10px 10px 0;
    border: 2px solid var(--gray-200);
    border-left: none;
}

[data-theme="dark"] .input-group .btn-outline-secondary {
    background: var(--bg-secondary);
    border-color: var(--gray-700);
    color: var(--text-secondary);
}
</style>

<script>
document.getElementById('togglePassword').addEventListener('click', function() {
    const passwordInput = document.getElementById('password');
    const icon = this.querySelector('i');

    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        passwordInput.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
});
</script>
{% endblock %}
